kind = "mobile"
previewPath = "/mobile/"
title = "Traffic Analyzer iOS"
version = "1.0.0"
id = "artifacts/traffic-analyzer-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile/" ]
localPort = 22863

[services.development]
run = "pnpm --filter @workspace/traffic-analyzer-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/traffic-analyzer-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/traffic-analyzer-mobile", "run", "serve" ]

[services.env]
PORT = "22863"
BASE_PATH = "/mobile/"
